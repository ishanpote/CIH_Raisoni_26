<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>NexusLaunch | AI Pitch Analyzer with Visual Charts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #f5f3ff 0%, #eef2ff 100%);
  min-height: 100vh;
  padding: 40px 20px;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
}

/* Header/Nav */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 16px;
}

.logo {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  transition: transform 0.3s ease;
}

.logo:hover {
  transform: scale(1.02);
}

.back-btn {
  background: rgba(79, 70, 229, 0.1);
  border: 1px solid rgba(79, 70, 229, 0.2);
  padding: 10px 24px;
  border-radius: 40px;
  font-weight: 600;
  font-size: 14px;
  color: #4f46e5;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.back-btn:hover {
  background: rgba(79, 70, 229, 0.2);
  transform: translateX(-3px);
}

.demo-btn {
  background: rgba(79, 70, 229, 0.1);
  border: 1px solid rgba(79, 70, 229, 0.2);
  padding: 10px 20px;
  border-radius: 40px;
  font-weight: 600;
  font-size: 13px;
  color: #4f46e5;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.demo-btn:hover {
  background: rgba(79, 70, 229, 0.2);
  transform: translateY(-2px);
}

/* Main Card */
.analyzer-card {
  background: white;
  border-radius: 48px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
  overflow: hidden;
  animation: fadeUp 0.6s ease forwards;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.card-header {
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  padding: 32px 40px;
  color: white;
  text-align: center;
}

.card-header h1 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.card-header p {
  opacity: 0.9;
  font-size: 15px;
}

.form-section {
  padding: 40px;
}

/* Form Grid */
.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

@media (max-width: 640px) {
  .form-grid {
    grid-template-columns: 1fr;
  }
  .form-section {
    padding: 24px;
  }
  .card-header {
    padding: 24px 20px;
  }
  .card-header h1 {
    font-size: 24px;
  }
}

.input-group {
  margin-bottom: 8px;
}

.input-group.full-width {
  grid-column: span 2;
}

@media (max-width: 640px) {
  .input-group.full-width {
    grid-column: span 1;
  }
}

.input-group label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 14px;
  color: #1e293b;
  margin-bottom: 8px;
}

.input-group label i {
  color: #4f46e5;
  width: 20px;
}

input, textarea {
  width: 100%;
  padding: 14px 18px;
  border: 1.5px solid #e2e8f0;
  border-radius: 20px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  transition: all 0.3s ease;
  background: #fafbff;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #4f46e5;
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
  background: white;
}

textarea {
  resize: vertical;
  min-height: 100px;
}

/* Analyze Button */
.analyze-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  border: none;
  border-radius: 48px;
  font-size: 16px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 24px;
  box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
  position: relative;
  overflow: hidden;
}

.analyze-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}

.analyze-btn:hover::before {
  left: 100%;
}

.analyze-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(79, 70, 229, 0.4);
}

.analyze-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Loading Animation */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 30px;
}

.spinner {
  width: 24px;
  height: 24px;
  border: 3px solid rgba(79, 70, 229, 0.2);
  border-top-color: #4f46e5;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Result Section - enhanced for chart layout */
.result-section {
  margin-top: 24px;
  border-top: 2px solid #eef2ff;
  padding: 28px 40px 40px 40px;
  background: white;
}

.result-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: 700;
  color: #1e293b;
  margin-bottom: 20px;
}

/* Dashboard with charts grid */
.charts-dashboard {
  display: flex;
  flex-wrap: wrap;
  gap: 28px;
  margin-bottom: 32px;
  justify-content: space-between;
}

.donut-container {
  flex: 1;
  min-width: 200px;
  background: #ffffff;
  border-radius: 32px;
  padding: 20px 16px;
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.03);
  border: 1px solid #eef2ff;
}

.donut-container h4 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  color: #1f2937;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.donut-canvas {
  max-width: 180px;
  margin: 0 auto;
  position: relative;
}

.score-value {
  font-size: 28px;
  font-weight: 800;
  fill: #4f46e5;
}

.bar-charts-container {
  flex: 2;
  min-width: 260px;
  background: #ffffff;
  border-radius: 32px;
  padding: 20px 20px;
  border: 1px solid #eef2ff;
}

.bar-charts-container h4 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: #1f2937;
  display: flex;
  align-items: center;
  gap: 6px;
}

.bar-item {
  margin-bottom: 18px;
}

.bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 6px;
  color: #334155;
}

.bar-bg {
  background: #e2e8f0;
  border-radius: 40px;
  height: 10px;
  overflow: hidden;
  width: 100%;
}

.bar-fill {
  background: linear-gradient(90deg, #4f46e5, #7c3aed);
  width: 0%;
  height: 100%;
  border-radius: 40px;
  transition: width 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

/* analysis text styling */
.analysis-text {
  margin-top: 24px;
  background: linear-gradient(135deg, #f8fafc, #f1f5f9);
  border-radius: 28px;
  padding: 24px 28px;
  border: 1px solid rgba(79, 70, 229, 0.1);
}

.section-block {
  margin-bottom: 24px;
  animation: fadeSlide 0.4s ease;
}

@keyframes fadeSlide {
  from { opacity: 0; transform: translateX(-6px);}
  to { opacity: 1; transform: translateX(0);}
}

.section-title {
  font-weight: 700;
  font-size: 17px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: #0f172a;
}

.bullet-point {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 12px;
  font-size: 14px;

  color: #334155;

}

.bullet-icon {

.verdict {

  font-weight: 500;

.error-message {

  padding: 16px 20px;
  border-radius: 16px;
  color: #991b1b;

.footer {
  text-align: center;
  margin-top: 32px;
  font-size: 12px;
  color: #94a3b8;
  display: flex;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
}

.footer a {
  color: #4f46e5;
  text-decoration: none;
}

.footer a:hover {

}

.temp-message {

  padding: 12px 20px;

@media (max-width: 700px) {
  .charts-dashboard {
    flex-direction: column;
  }
  .result-section {
    padding: 20px;
  }
}
</style>
</head>

<script>

const OPENROUTER_API_KEY = "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";

let donutChartInstance = null;
let barFillElements = null;

function showTempMessage(msg, color = '#10b981') {
  const existing = document.querySelector('.temp-message');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'temp-message';
  div.style.background = color;
  div.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2500);
}

function fillDemoData() {
  document.getElementById('name').value = 'GreenChain Logistics';
  document.getElementById('pitch').value = 'AI-powered supply chain optimization for eco-friendly deliveries. We reduce carbon footprint by 40% using real-time routing algorithms and electric vehicle integration. Our proprietary algorithm analyzes traffic, weather, and vehicle efficiency to create the most sustainable delivery routes.';
  document.getElementById('audience').value = 'E-commerce businesses, logistics companies, sustainable brands, retail chains';
  document.getElementById('revenue').value = 'SaaS subscription ($499-1999/month) + 2% transaction fee on carbon credits saved';
  document.getElementById('investment').value = '$250,000 seed round for product development and pilot partnerships';
  document.getElementById('team').value = '3 co-founders (ex-Amazon Logistics manager, AI researcher with PhD, sustainability expert from WWF)';
  showTempMessage('Demo data loaded! Click Analyze to test.', '#4f46e5');
}

function destroyChart() {
  if (donutChartInstance) {
    donutChartInstance.destroy();
    donutChartInstance = null;
  }
}

// Extract scores from AI text (robust regex)
function extractScoresFromText(text) {
  const scores = { market: 0, competition: 0, feasibility: 0, scalability: 0, viability: 0 };
  // Viability score: "VIABILITY SCORE: 7.5/10"
  const viabilityMatch = text.match(/VIABILITY SCORE:\s*(\d+(?:\.\d+)?)\/10/i);
  if (viabilityMatch) scores.viability = parseFloat(viabilityMatch[1]);
  
  // Score breakdown: "Market Demand: 8/10" or "- Market Demand: 7/10"
  const marketMatch = text.match(/Market Demand:\s*(\d+(?:\.\d+)?)\/10/i);
  if (marketMatch) scores.market = parseFloat(marketMatch[1]);
  const compMatch = text.match(/Competition:\s*(\d+(?:\.\d+)?)\/10/i);
  if (compMatch) scores.competition = parseFloat(compMatch[1]);
  const feasMatch = text.match(/Feasibility:\s*(\d+(?:\.\d+)?)\/10/i);
  if (feasMatch) scores.feasibility = parseFloat(feasMatch[1]);
  const scalMatch = text.match(/Scalability:\s*(\d+(?:\.\d+)?)\/10/i);
  if (scalMatch) scores.scalability = parseFloat(scalMatch[1]);
  
  return scores;
}

// Render donut chart + bar graphs using extracted scores
function renderCharts(scores) {
  const container = document.getElementById('chartsVisuals');
  if (!container) return;
  const viability = Math.min(10, Math.max(0, scores.viability || 6.5));
  const market = Math.min(10, Math.max(0, scores.market || 6));
  const competition = Math.min(10, Math.max(0, scores.competition || 5.5));
  const feasibility = Math.min(10, Math.max(0, scores.feasibility || 6));
  const scalability = Math.min(10, Math.max(0, scores.scalability || 5.8));
  
  container.innerHTML = `
    <div class="charts-dashboard">
      <div class="donut-container">
        <h4><i class="fas fa-chart-simple"></i> Viability Score</h4>
        <div class="donut-canvas">
          <canvas id="viabilityDonutCanvas" width="180" height="180" style="max-width:180px; margin:0 auto;"></canvas>
        </div>
        <div style="margin-top: 10px; font-weight:600;">${viability.toFixed(1)} / 10</div>
      </div>
      <div class="bar-charts-container">
        <h4><i class="fas fa-chart-line"></i> Score Breakdown</h4>
        <div class="bar-item" data-score="${market}"><div class="bar-label"><span>📊 Market Demand</span><span id="marketVal">${market.toFixed(1)}</span></div><div class="bar-bg"><div class="bar-fill" id="barMarket" style="width: 0%;"></div></div></div>
        <div class="bar-item" data-score="${competition}"><div class="bar-label"><span>⚔️ Competition</span><span id="compVal">${competition.toFixed(1)}</span></div><div class="bar-bg"><div class="bar-fill" id="barComp" style="width: 0%;"></div></div></div>
        <div class="bar-item" data-score="${feasibility}"><div class="bar-label"><span>🔧 Feasibility</span><span id="feasVal">${feasibility.toFixed(1)}</span></div><div class="bar-bg"><div class="bar-fill" id="barFeas" style="width: 0%;"></div></div></div>
        <div class="bar-item" data-score="${scalability}"><div class="bar-label"><span>🚀 Scalability</span><span id="scalVal">${scalability.toFixed(1)}</span></div><div class="bar-bg"><div class="bar-fill" id="barScal" style="width: 0%;"></div></div></div>
      </div>
    </div>
  `;
  
  // Animate bars after render
  setTimeout(() => {
    const marketBar = document.getElementById('barMarket');
    const compBar = document.getElementById('barComp');
    const feasBar = document.getElementById('barFeas');
    const scalBar = document.getElementById('barScal');
    if (marketBar) marketBar.style.width = `${(market/10)*100}%`;
    if (compBar) compBar.style.width = `${(competition/10)*100}%`;
    if (feasBar) feasBar.style.width = `${(feasibility/10)*100}%`;
    if (scalBar) scalBar.style.width = `${(scalability/10)*100}%`;
  }, 50);
  
  // Draw donut chart
  const canvas = document.getElementById('viabilityDonutCanvas');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    destroyChart();
    donutChartInstance = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Viability Score', 'Remaining'],
        datasets: [{
          data: [viability, 10 - viability],
          backgroundColor: ['#4f46e5', '#e2e8f0'],
          borderWidth: 0,
          cutout: '65%',
          borderRadius: 8,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(1)}/10` } } }
      }
    });
  }
}

// Parse analysis text into structured bullets (strengths/weaknesses/suggestions/verdict)
function parseStructuredAnalysis(rawText) {
  const sections = {
    strengths: [],
    weaknesses: [],
    suggestions: [],
    verdict: ''
  };
  // Extract strengths (after ✅ **STRENGTHS:** or similar)
  const strengthsMatch = rawText.match(/(?:✅\s*\**STRENGTHS\**\s*:?)(.*?)(?=⚠️|⚠️\s*WEAKNESSES|💡|🚀|$)/is);
  if (strengthsMatch) {
    const block = strengthsMatch[1];
    const points = block.match(/•\s*(.*?)(?=\n•|\n\n|$)/gs);
    if (points) sections.strengths = points.map(p => p.replace(/•\s*/, '').trim()).filter(p => p);
    else sections.strengths = [block.trim()];
  }
  const weaknessesMatch = rawText.match(/(?:⚠️\s*\**WEAKNESSES|RISKS\**\s*:?)(.*?)(?=💡|✅|🚀|$)/is);
  if (weaknessesMatch) {
    const block = weaknessesMatch[1];
    const points = block.match(/•\s*(.*?)(?=\n•|\n\n|$)/gs);
    if (points) sections.weaknesses = points.map(p => p.replace(/•\s*/, '').trim()).filter(p => p);
    else sections.weaknesses = [block.trim()];
  }
  const suggestionsMatch = rawText.match(/(?:💡\s*\**ACTIONABLE SUGGESTIONS\**\s*:?)(.*?)(?=🚀|✅|⚠️|$)/is);
  if (suggestionsMatch) {
    const block = suggestionsMatch[1];
    const points = block.match(/•\s*(.*?)(?=\n•|\n\n|$)/gs);
    if (points) sections.suggestions = points.map(p => p.replace(/•\s*/, '').trim()).filter(p => p);
    else sections.suggestions = [block.trim()];
  }
  const verdictMatch = rawText.match(/(?:🚀\s*\**INVESTOR VERDICT\**\s*:?)(.*?)(?=\n\n|\n$|$)/is);
  if (verdictMatch) sections.verdict = verdictMatch[1].trim();
  else {
    const altVerdict = rawText.match(/Verdict:\s*(.*?)(?=\n\n|\n$)/i);
    if (altVerdict) sections.verdict = altVerdict[1].trim();
  }
  return sections;
}

// render bullet points with justify & icons
function renderBulletPoints(sections) {
  let html = '';
  if (sections.strengths.length) {
    html += `<div class="section-block"><div class="section-title"><span style="color:#10b981;">✅</span> Strengths</div>`;
    sections.strengths.forEach(s => { html += `<div class="bullet-point"><span class="bullet-icon"><i class="fas fa-check-circle" style="color:#10b981;"></i></span><span style="flex:1; text-align:justify;">${s}</span></div>`; });
    html += `</div>`;
  }
  if (sections.weaknesses.length) {
    html += `<div class="section-block"><div class="section-title"><span style="color:#f59e0b;">⚠️</span> Weaknesses & Risks</div>`;
    sections.weaknesses.forEach(w => { html += `<div class="bullet-point"><span class="bullet-icon"><i class="fas fa-exclamation-triangle" style="color:#f59e0b;"></i></span><span style="flex:1; text-align:justify;">${w}</span></div>`; });
    html += `</div>`;
  }
  if (sections.suggestions.length) {
    html += `<div class="section-block"><div class="section-title"><span style="color:#8b5cf6;">💡</span> Actionable Suggestions</div>`;
    sections.suggestions.forEach(sug => { html += `<div class="bullet-point"><span class="bullet-icon"><i class="fas fa-lightbulb" style="color:#8b5cf6;"></i></span><span style="flex:1; text-align:justify;">${sug}</span></div>`; });
    html += `</div>`;
  }
  if (sections.verdict) {
    html += `<div class="verdict"><i class="fas fa-gavel"></i> <strong>Investor Verdict:</strong> ${sections.verdict}</div>`;
  }
  return html;
}

async function analyzeStartup() {
  const resultSection = document.getElementById('resultSection');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const chartsVisualsDiv = document.getElementById('chartsVisuals');
  const analysisDetailsDiv = document.getElementById('analysisDetails');
  
  const startupData = {
    name: document.getElementById('name').value.trim(),
    pitch: document.getElementById('pitch').value.trim(),
    audience: document.getElementById('audience').value.trim(),
    revenue: document.getElementById('revenue').value.trim(),
    investment: document.getElementById('investment').value.trim(),
    team: document.getElementById('team').value.trim()
  };
  
  if (!startupData.pitch && !startupData.name) {
    resultSection.style.display = 'block';
    analysisDetailsDiv.innerHTML = `<div class="error-message"><i class="fas fa-info-circle"></i> <strong>Missing Information</strong><br>Please describe your startup idea or pitch.</div>`;
    chartsVisualsDiv.innerHTML = '';
    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }
  
  analyzeBtn.disabled = true;
  analyzeBtn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div> Analyzing your pitch...';
  resultSection.style.display = 'block';
  chartsVisualsDiv.innerHTML = `<div class="loading"><div class="spinner"></div><span>AI evaluating metrics...</span></div>`;
  analysisDetailsDiv.innerHTML = '';
  resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  
  const startupText = `
Startup Name: ${startupData.name || "Not specified"}
Pitch / Problem Statement: ${startupData.pitch || "Not specified"}
Target Audience: ${startupData.audience || "Not specified"}
Revenue Model: ${startupData.revenue || "Not specified"}
Starting Investment: ${startupData.investment || "Not specified"}
Team Expertise: ${startupData.team || "Not specified"}
`;
  const prompt = `You are an experienced startup investor. Evaluate the following startup idea professionally and provide structured analysis EXACTLY with these sections and emojis:

🔹 **VIABILITY SCORE: X/10** (0-10)

📊 **SCORE BREAKDOWN:**
- Market Demand: X/10 (brief reason)
- Competition: X/10 (brief reason)
- Feasibility: X/10 (brief reason)
- Scalability: X/10 (brief reason)

✅ **STRENGTHS:**
• (2-4 bullet points)

⚠️ **WEAKNESSES / RISKS:**
• (2-4 bullet points)

💡 **ACTIONABLE SUGGESTIONS:**
• (2-4 bullet points)

🚀 **INVESTOR VERDICT:**
(one clear sentence)

Startup Details:
${startupText}`;

  try {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
        "HTTP-Referer": window.location.origin,
        "X-Title": "NexusLaunch Pitch Analyzer"
      },
      body: JSON.stringify({
        model: "qwen/qwen3.6-plus:free",
        messages: [{ role: "user", content: prompt }],
        temperature: 0.7,
        max_tokens: 1500
      })
    });
    const data = await response.json();
    if (data.choices && data.choices.length > 0) {
      let rawContent = data.choices[0].message.content;
      const scores = extractScoresFromText(rawContent);
      renderCharts(scores);
      const structured = parseStructuredAnalysis(rawContent);
      const bulletsHtml = renderBulletPoints(structured);
      let fallbackReason = '';
      if (structured.strengths.length === 0 && structured.weaknesses.length === 0) {
        fallbackReason = `<div class="section-block"><div class="bullet-point"><span>✨ Analysis generated, but formatting adjusted for readability:</span></div><div style="white-space:pre-wrap; margin-top:12px;">${rawContent.replace(/\n/g, '<br>')}</div></div>`;
      }
      analysisDetailsDiv.innerHTML = bulletsHtml || fallbackReason || `<div class="analysis-text">${rawContent.replace(/\n/g, '<br>')}</div>`;
    } else {
      throw new Error(data.error?.message || 'Invalid API response');
    }
  } catch (err) {
    console.error(err);
    chartsVisualsDiv.innerHTML = '';
    analysisDetailsDiv.innerHTML = `<div class="error-message"><i class="fas fa-wifi"></i> <strong>Error:</strong> ${err.message || 'API connection failed.'}</div>`;
  } finally {
    analyzeBtn.disabled = false;
    analyzeBtn.innerHTML = '<i class="fas fa-microchip"></i> Analyze with AI';
  }
}

document.getElementById('analyzeBtn').addEventListener('click', analyzeStartup);
document.getElementById('demoBtn').addEventListener('click', fillDemoData);

const inputs = ['name', 'pitch', 'audience', 'revenue', 'investment', 'team'];
inputs.forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('keypress', (e) => { if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); analyzeStartup(); } });
});
</script>
